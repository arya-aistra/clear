# ClearVAD multi-teacher variant: adds LayerNorm-before-G-SSM (anti-stickiness lever).
# Same size class as base (+256 params for the LayerNorm). Used for the Silero+Pyannote run.
name: clearvad_mt

frontend:
  in_channels: 1
  out_channels: 258
  kernel_size: 256
  stride: 128
  learnable: true

encoder:
  channel_schedule: [129, 128, 64, 64, 128]
  depthwise_separable: true
  kernel_size: 3

gssm:
  d_model: 128
  d_inner: 256
  d_state: 16
  dt_rank: 8
  tie_projections: false
  input_norm: true         # LayerNorm before G-SSM -> bounds Δ -> less sticky endpoint/FAR

head:
  in_channels: 128
  out_channels: 1
  reduction: mean

audio:
  sample_rate: 16000
  chunk_samples: 512
  context_samples: 64
  total_input_samples: 576
