# ClearVAD lite: tied G-SSM projections + last-frame head. Smallest deployable variant.
# Used for the size/INT8 headline claims and the faithful-vs-tied ablation.
name: clearvad_lite

frontend:
  in_channels: 1
  out_channels: 258
  kernel_size: 256
  stride: 128
  learnable: true

encoder:
  channel_schedule: [129, 128, 64, 64, 128]
  depthwise_separable: true
  kernel_size: 3

gssm:
  d_model: 128
  d_inner: 256
  d_state: 16
  dt_rank: 8
  tie_projections: true    # 82,432 G-SSM params (< 100K soft target)

head:
  in_channels: 128
  out_channels: 1
  reduction: last          # strictly causal, lowest endpoint latency

audio:
  sample_rate: 16000
  chunk_samples: 512
  context_samples: 64
  total_input_samples: 576
