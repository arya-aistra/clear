# ClearVAD base model (faithful G-SSM). ~220K params, < Silero's 309K.
name: clearvad_base

frontend:
  in_channels: 1
  out_channels: 258        # 129 real + 129 imag -> 129 magnitude features
  kernel_size: 256
  stride: 128
  learnable: true          # learnable STFT basis (warm-startable from Silero in Phase 3)

encoder:
  channel_schedule: [129, 128, 64, 64, 128]   # mirrors Silero's measured schedule
  depthwise_separable: true                     # lighter than Silero's plain convs
  kernel_size: 3

gssm:
  d_model: 128
  d_inner: 256
  d_state: 16
  dt_rank: 8
  tie_projections: false   # faithful (115,200 G-SSM params; < LSTM 131,584)

head:
  in_channels: 128
  out_channels: 1
  reduction: mean          # 'mean' matches Silero's ReduceMean; 'last' = low-latency

# Audio interface (frozen project-wide)
audio:
  sample_rate: 16000
  chunk_samples: 512
  context_samples: 64
  total_input_samples: 576
