# DFKD Stage 1 — soft-label alignment. Real speech + synthetic, class-balanced.
# real_fraction is only honored if the trainer is given a real_source (--use-real /
# --local-speech-dir); otherwise it falls back to pure synthetic.
stage: stage1
seed: 1234

steps: 6000              # converges fast (synthetic trial plateaued ~1-2k); parallel scan is quick
batch_size: 128          # parallel scan uses more memory than the loop; raise if headroom
chunks_per_sample: 64
lr: 3.0e-4
weight_decay: 1.0e-4

# loss — Stage 1: soft labels, class-balanced for the speech minority
lambda_soft: 1.0
lambda_boundary: 0.0
lambda_smooth: 0.0
temperature: 2.0
pos_weight: 3.0          # upweight teacher-speech frames (counter silence prior)

# data: real speech dominant, synthetic for controllable negatives/edge cases
real_fraction: 0.7
snr_range: [0.0, 20.0]   # synthetic-noise augmentation SNR on real clips
pool_size: 2048
refresh_every: 1500
label_batch: 256
category_weights:        # the synthetic remainder
  noise: 0.35
  speech: 0.20
  transition: 0.30
  hardneg: 0.15

log_every: 50
agree_every: 500
ckpt_every: 3000
