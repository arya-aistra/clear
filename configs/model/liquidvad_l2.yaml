# LiquidVAD with a 2-layer CfC core (capacity bump for the scaled robustness pass).
# ~300k params — still smaller than Silero's 309k.
name: liquidvad_l2
arch: cfc

frontend:
  in_channels: 1
  out_channels: 258
  kernel_size: 256
  stride: 128
  learnable: true

encoder:
  channel_schedule: [129, 128, 64, 64, 128]
  depthwise_separable: true
  kernel_size: 3

cfc:
  d_model: 128
  hidden: 128
  layers: 2                  # 2 stacked CfC cells (capacity bump)
  backbone_units: 128
  dropout: 0.1               # mild regularization for the larger model + more data

head:
  in_channels: 128
  out_channels: 1
  reduction: mean

audio:
  sample_rate: 16000
  chunk_samples: 512
  context_samples: 64
  total_input_samples: 576
